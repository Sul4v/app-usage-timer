name: Capsule
options:
  bundleIdPrefix: com.sodhera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    DEVELOPMENT_TEAM: ""
targets:
  Capsule:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule
        CODE_SIGN_ENTITLEMENTS: App/Capsule.entitlements
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Capsule
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        SupabaseURL: ""
        SupabaseAnonKey: ""
    dependencies:
      - target: CapsuleMonitor
      - target: CapsuleWidgets
  CapsuleMonitor:
    type: app-extension
    platform: iOS
    sources:
      - Monitor/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule.monitor
        CODE_SIGN_ENTITLEMENTS: Monitor/CapsuleMonitor.entitlements
    info:
      path: Monitor/Info.plist
      properties:
        CFBundleDisplayName: Capsule Usage Monitor
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).UsageMonitorExtension
  CapsuleWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule.widgets
        CODE_SIGN_ENTITLEMENTS: Widgets/CapsuleWidgets.entitlements
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Capsule Widgets
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
