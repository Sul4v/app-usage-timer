name: Capsule
options:
  bundleIdPrefix: com.sodhera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Only generate a scheme for the app itself — CapsuleMonitor and
  # CapsuleWidgets are extensions with no standalone executable, so an
  # auto-generated scheme for them makes Xcode prompt to "choose a host
  # app" when accidentally selected. Building Capsule already builds and
  # embeds both via its target dependencies.
  autogenerateSchemes: false
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    # Pinned so `xcodegen generate` doesn't wipe the team you pick in
    # Xcode's Signing & Capabilities on every regenerate. Replace if this
    # isn't your team ID (Xcode ▸ Settings ▸ Accounts shows it).
    DEVELOPMENT_TEAM: "6LYZDNCM4M"
targets:
  Capsule:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule
        CODE_SIGN_ENTITLEMENTS: App/Capsule.entitlements
        INFOPLIST_KEY_UIUserInterfaceStyle: Automatic
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Capsule
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Public client config: the anon key is designed to ship in apps;
        # row-level security governs all data access.
        SupabaseURL: "https://ubglgtworopygeenbnvb.supabase.co"
        SupabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViZ2xndHdvcm9weWdlZW5ibnZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODEyOTksImV4cCI6MjA5ODU1NzI5OX0.q4vUpxgxzLBaV1iZsjZgAXiQKaJETLYd7Z5lFmRLVto"
    dependencies:
      - target: CapsuleMonitor
      - target: CapsuleWidgets
      - target: CapsuleShield
      - target: CapsuleShieldAction
  CapsuleMonitor:
    type: app-extension
    platform: iOS
    sources:
      - Monitor/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule.monitor
        CODE_SIGN_ENTITLEMENTS: Monitor/CapsuleMonitor.entitlements
    info:
      path: Monitor/Info.plist
      properties:
        CFBundleDisplayName: Capsule Usage Monitor
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).UsageMonitorExtension
  CapsuleWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule.widgets
        CODE_SIGN_ENTITLEMENTS: Widgets/CapsuleWidgets.entitlements
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Capsule Widgets
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  CapsuleShield:
    type: app-extension
    platform: iOS
    sources:
      - Shield/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule.shield
        CODE_SIGN_ENTITLEMENTS: Shield/CapsuleShield.entitlements
    info:
      path: Shield/Info.plist
      properties:
        CFBundleDisplayName: Capsule Shield
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettingsUI.shield-configuration-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldConfigDataSource
  CapsuleShieldAction:
    type: app-extension
    platform: iOS
    sources:
      - ShieldAction/Sources
      - Shared/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sodhera.capsule.shieldaction
        CODE_SIGN_ENTITLEMENTS: ShieldAction/CapsuleShieldAction.entitlements
    info:
      path: ShieldAction/Info.plist
      properties:
        CFBundleDisplayName: Capsule Shield Action
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ManagedSettings.shield-action-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShieldActionExtension

schemes:
  Capsule:
    build:
      targets:
        Capsule: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
